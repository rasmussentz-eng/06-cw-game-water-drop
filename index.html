<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <img src="img/cw_logo-horizontal.png" alt="charity: water logo" class="logo">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <div class="goal">Goal: <span id="goal">20</span></div>
            <div class="mode-group">
                <label for="difficulty-select" class="mode-label">Mode</label>
                <select id="difficulty-select">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <div class="button-group">
                <button id="start-btn">Start Game</button>
                <button id="reset-btn" class="hidden">Reset Game</button>
            </div>
        </div>
        <div id="message" class="message">Press Start to begin.</div>
        <div id="game-container"></div>
        <footer class="site-footer">
            <p>Support clean water projects around the world.</p>
            <div class="footer-links">
                <a href="https://www.charitywater.org" target="_blank" rel="noopener noreferrer">charity: water</a>
                <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate</a>
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
